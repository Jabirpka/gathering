<!-- @dsCard group="Gathering — Screens" name="Login" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gathering — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap');


  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; gap: 18px;
    background: #08000c; padding: 28px 24px; font-family: 'Space Grotesk', system-ui, sans-serif;
  }
  .tabs { display: flex; gap: 6px; background: rgba(34,0,64,0.6); padding: 5px; border-radius: 22px; border: 1px solid rgba(232,121,249,0.18); }
  .tab { border: none; cursor: pointer; padding: 7px 16px; border-radius: 18px; font-size: 13px; font-weight: 600; font-family: inherit; color: #9b7abd; background: transparent; transition: all .15s; }
  .tab.on { background: linear-gradient(135deg, #e879f9, #a855f7); color: #fff; }
  .phone {
    width: 360px; height: 720px; border-radius: 36px; overflow: hidden; position: relative;
    background: #0d0010;
    background-image:
      radial-gradient(28rem 16rem at 50% -8%, rgba(232,121,249,0.18), transparent 62%),
      radial-gradient(20rem 20rem at 108% 6%, rgba(168,85,247,0.13), transparent 60%);
    border: 1px solid #330060; box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    color: #fff; display: none; flex-direction: column;
  }
  .phone.on { display: flex; }
  .avatar { border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0; }
  .grad { background: linear-gradient(135deg, #e879f9, #a855f7); }
  .sub { color: #9b7abd; }
  .cbtn { width: 36px; height: 36px; border-radius: 50%; background: rgba(232,121,249,0.12); color: #e879f9; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .hicon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #9b7abd; font-size: 15px; }
  .head { height: 56px; border-bottom: 1px solid #330060; background: rgba(22,0,32,0.86); display: flex; align-items: center; padding: 0 8px; }
  .composer { padding: 12px 14px 28px; background: rgba(22,0,32,0.86); border-top: 1px solid #330060; display: flex; align-items: center; gap: 10px; }
  .field { flex: 1; background: #220040; border-radius: 10px; padding: 11px 16px; font-size: 13px; color: #9b7abd; }
  .send { width: 40px; height: 40px; border-radius: 12px; font-size: 16px; }
  .recv { background: rgba(232,121,249,0.08); border: 1px solid rgba(232,121,249,0.20); border-radius: 3px 18px 18px 18px; padding: 10px 14px; font-size: 14px; }
  .mine { border-radius: 18px 3px 18px 18px; padding: 10px 14px; font-size: 14px; box-shadow: 0 4px 20px rgba(232,121,249,0.4); }
  .stamp { color: #9b7abd; font-size: 10px; margin-top: 4px; }
</style>
</head>
<body>
<div class="phone on" id="login">
  <!-- Logo -->
  <div style="display:flex;align-items:center;justify-content:center;gap:9px;padding:36px 0 8px;">
    <div class="avatar grad" style="width:38px;height:38px;border-radius:12px;font-size:18px;">▶</div>
    <span style="font-size:22px;font-weight:700;letter-spacing:-0.5px;">Gathering</span>
  </div>

  <!-- Hero text -->
  <div style="text-align:center;padding:18px 28px 20px;">
    <div style="font-size:34px;font-weight:700;line-height:1.1;letter-spacing:-1.5px;">Stay close.<br><span style="background:linear-gradient(90deg,#e879f9,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;">Anywhere.</span></div>
    <div class="sub" style="font-size:13px;line-height:1.5;margin-top:10px;">Your people. One place.</div>
  </div>

  <!-- Glow blob -->
  <div style="position:absolute;width:260px;height:200px;border-radius:50%;background:rgba(232,121,249,0.13);filter:blur(56px);left:50%;transform:translateX(-50%);top:200px;pointer-events:none;"></div>

  <!-- Phone number input -->
  <div style="padding:0 22px;display:flex;flex-direction:column;gap:10px;position:relative;">
    <div style="display:flex;align-items:center;gap:0;background:#220040;border:1px solid #440080;border-radius:14px;overflow:hidden;">
      <div style="padding:13px 14px;font-size:14px;font-weight:600;color:#e879f9;border-right:1px solid #440080;white-space:nowrap;">🇵🇰 +92</div>
      <input type="tel" placeholder="Phone number" style="flex:1;background:transparent;border:none;outline:none;padding:13px 14px;font-size:14px;color:#fff;font-family:'Space Grotesk',sans-serif;">
    </div>
    <button style="width:100%;padding:14px;background:linear-gradient(135deg,#e879f9,#a855f7);border:none;border-radius:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 6px 24px rgba(232,121,249,0.45);">Continue →</button>
  </div>

  <!-- Divider -->
  <div style="display:flex;align-items:center;gap:10px;padding:18px 22px;">
    <div style="flex:1;height:1px;background:#330060;"></div>
    <span class="sub" style="font-size:12px;">or</span>
    <div style="flex:1;height:1px;background:#330060;"></div>
  </div>

  <!-- Google sign-in -->
  <div style="padding:0 22px;">
    <button style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#1a0030;font-weight:600;padding:13px 24px;border-radius:14px;font-size:14px;border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 6px 24px rgba(0,0,0,0.35);">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path></svg>
      Continue with Google
    </button>
  </div>

  <!-- Footer -->
  <div class="sub" style="text-align:center;font-size:11px;padding:20px 24px 0;line-height:1.6;">By continuing you agree to our <span style="color:#e879f9;">Terms</span> &amp; <span style="color:#e879f9;">Privacy</span></div>
</div>
<script>
  document.querySelectorAll('.tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab').forEach(function (b) { b.classList.remove('on'); });
      document.querySelectorAll('.phone').forEach(function (p) { p.classList.remove('on'); });
      btn.classList.add('on');
      document.getElementById(btn.dataset.t).classList.add('on');
    });
  });

  function togglePopup() {
    var popup = document.getElementById('homePopup');
    popup.style.display = popup.style.display === 'flex' ? 'none' : 'flex';
  }

  function switchTab(tab) {
    var joinTab = document.getElementById('joinTab');
    var createTab = document.getElementById('createTab');
    var joinForm = document.getElementById('joinForm');
    var createForm = document.getElementById('createForm');
    if (tab === 'join') {
      joinTab.style.background = 'linear-gradient(135deg,#e879f9,#a855f7)';
      joinTab.style.color = '#fff';
      createTab.style.background = 'transparent';
      createTab.style.color = '#9b7abd';
      joinForm.style.display = 'flex';
      createForm.style.display = 'none';
    } else {
      createTab.style.background = 'linear-gradient(135deg,#e879f9,#a855f7)';
      createTab.style.color = '#fff';
      joinTab.style.background = 'transparent';
      joinTab.style.color = '#9b7abd';
      createForm.style.display = 'flex';
      joinForm.style.display = 'none';
    }
  }

  // close popup when tapping backdrop
  document.addEventListener('click', function(e) {
    var popup = document.getElementById('homePopup');
    if (popup && e.target === popup) popup.style.display = 'none';
  });
</script>
</body>
</html>
